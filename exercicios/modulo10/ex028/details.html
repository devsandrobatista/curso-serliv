<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Details</title>

    <style>
      details {
        cursor: pointer;
        user-select: none;
      }

      details[open] {
        background: #00000041;
        width: fit-content;
        padding: 4px 8px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Curso Web Design</h1>
    <details open>
      <summary>Pré-requisitos</summary>
      <p>
        Para fazer esse curso é necessário conhecimento de Sistema operacional
      </p>
    </details>
  </body>
</html>
