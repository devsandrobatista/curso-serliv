<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outline</title>

    <style>
      .outline {
        width: 200px;
        height: 100px;
        background: #ff0;
        outline: 4px solid #f00;
      }

      .outline:hover {
        outline: 4px solid #00f;
        outline-offset: 6px;
      }
    </style>
  </head>
  <body>
    <div class="outline">
      <h1 class="outline__title">Outline</h1>
    </div>
  </body>
</html>
