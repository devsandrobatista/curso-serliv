<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escopo de Variáveis</title>

    <style>
      :root {
        --color: #f00;
      }

      html {
        font-size: 200%;
      }

      .container {
        --color: #fa3;
      }

      p {
        color: var(--color);
      }

      .div1 {
        --color: #0f0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="div1">
        <p>Lorem, ipsum dolor.</p>
      </div>
      <div class="div2">
        <p>Quaerat, fuga laboriosam?</p>
      </div>
    </div>

    <p>teste</p>
  </body>
</html>
