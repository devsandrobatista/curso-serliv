<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Page</title>

    <style>
      body {
        margin-bottom: 100vh;
      }
      .box {
        width: 400px;
        height: 200px;
        margin-bottom: 22px;
        background: #f00;
      }

      .box:nth-child(1) {
        clip-path: polygon(0% 0%, 100% 0%, 50% 50%);
      }

      .box:nth-child(2) {
        clip-path: polygon(
          0% 0%,
          100% 0%,
          100% 100%,
          50% 100%,
          50% 50%,
          0% 50%
        );
      }

      .box:nth-child(3) {
        clip-path: polygon(
          0% 0%,
          35% 40%,
          65% 40%,
          100% 0%,
          100% 100%,
          65% 65%,
          35% 65%,
          0% 100%
        );
      }

      .box:nth-child(4) {
        clip-path: polygon(50% 0%, 100% 100%, 0% 40%, 100% 40%, 0% 100%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
