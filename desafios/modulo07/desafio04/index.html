<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Sandro Batista" />
    <title>SERFRONTEND</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <main>
      <header class="hero">
        <h1 class="hero__title">Cursos SerFrontend</h1>
        <p class="hero__subtitle">
          Tudo que precisa saber para iniciar na carreira
        </p>
      </header>
      <section class="courses">
        <div class="container-flex">
          <article class="course course--selectors">
            <img
              src="assets/images/card_01.png"
              alt="Seletores"
              class="course__image"
            />
            <h3 class="course__title">Seletores</h3>
          </article>
          <article class="course course--position">
            <img
              src="assets/images/card_02.jpg"
              alt="Posicionamento"
              class="course__image"
            />
            <h3 class="course__title">Posicionamento</h3>
          </article>
          <article class="course course--fonts">
            <img
              src="assets/images/card_03.jpg"
              alt="Fontes"
              class="course__image"
            />
            <h3 class="course__title">Fontes</h3>
          </article>
          <article class="course course--flexbox">
            <img
              src="assets/images/card_04.jpg"
              alt="Flexbox"
              class="course__image"
            />
            <h3 class="course__title">Flexbox</h3>
          </article>
          <article class="course course--css-grid">
            <img
              src="assets/images/card_05.jpg"
              alt="CSS Grid"
              class="course__image"
            />
            <h3 class="course__title">CSS Grid</h3>
          </article>
          <article class="course course--semantic">
            <img
              src="assets/images/card_01.png"
              alt="Semântica"
              class="course__image"
            />
            <h3 class="course__title">Semântica</h3>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
