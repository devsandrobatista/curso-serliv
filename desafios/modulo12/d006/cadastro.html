<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <main class="main flex">
      <div class="container">
        <form action="" method="post" class="form">
          <fieldset class="form__field">
            <legend class="form__legend">Cadastre-se</legend>
            <div class="form__inputs flex">
              <label for="user" class="form__label">Usuário</label>
              <input
                type="text"
                name="user"
                id="user"
                class="form__input"
                required
              />
            </div>
            <div class="form__inputs flex">
              <label for="email" class="form__label">Email</label>
              <input
                type="email"
                name="email"
                id="email"
                class="form__input"
                required
              />
            </div>
            <div class="form__inputs flex">
              <label for="pass" class="form__label">Senha</label>
              <input
                type="password"
                name="pass"
                id="pass"
                class="form__input"
                required
                minlength="6"
                maxlength="10"
              />
            </div>
          </fieldset>
          <div class="form__cta flex">
            <input type="submit" value="Cadastre-se" class="btn" />
            <p class="form__text">
              Já possui cadastro?
              <a href="index.html" class="form__link">Faça login</a>
            </p>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
