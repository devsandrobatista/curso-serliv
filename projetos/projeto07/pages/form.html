<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Lib - Formulários</title>

    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div class="container flex">
      <header class="sidebar">
        <nav class="sidebar__nav">
          <a href="#" class="sidebar__link-profile">
            <img
              src="../assets/images/uifaces-popular-avatar.jpg"
              alt="Imagem de perfil"
              class="sidebar__avatar"
            />
          </a>
          <ul class="sidebar__list">
            <li class="sidebar__item">
              <a href="../index.html" class="sidebar__link">Home</a>
            </li>
            <li class="sidebar__item">
              <a href="typography.html" class="sidebar__link">Tipografia</a>
            </li>
            <li class="sidebar__item">
              <a href="cards.html" class="sidebar__link">Cards</a>
            </li>
            <li class="sidebar__item">
              <a href="lists.html" class="sidebar__link">Listas</a>
            </li>
            <li class="sidebar__item">
              <a href="form.html" class="sidebar__link">Formulário</a>
            </li>
            <li class="sidebar__item">
              <a href="buttons.html" class="sidebar__link">Botões</a>
            </li>
            <li class="sidebar__item">
              <a href="tables.html" class="sidebar__link">Tabelas</a>
            </li>
          </ul>
        </nav>
      </header>
      <main class="main main--cards">
        <h1 class="main__heading main__heading--primary">My Components</h1>

        <section>
          <h3 class="heading">Entre em contato</h3>
          <div class="row">
            <form action="" class="form-contact">
              <div class="row">
                <div>
                  <label for="name">Name</label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="nome completo"
                  />
                </div>
                <div>
                  <label for="email">Email</label>
                  <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="seu.email@exemplo.com"
                  />
                </div>
              </div>
              <label for="message">Digite sua mensagem</label>
              <textarea name="message" id="message"></textarea>
              <input type="submit" value="Enviar" class="btn" />
            </form>
            <address>
              <p>Endereço: Rua Exemplo, 123 - Cidade, Estado</p>
              <p>Telefone: (11) 1234-5678</p>
              <p>Email: contato@exemplo.com</p>
            </address>
          </div>
        </section>

        <section>
          <h2 class="heading">Quiz</h2>

          <form class="form-quiz">
            <label for="tecnologia">Qual é a sua linguagem preferida?</label>
            <select name="tecnologia" id="tecnologia">
              <option value="">Selecione</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="javascript">JavaScript</option>
            </select>

            <div class="rquiz">
              <label for="prioridade">Baixa Prioridade</label>
              <input
                type="radio"
                name="prioridade"
                id="prioridade"
                value="baixa"
              />
            </div>
            <div class="rquiz">
              <label for="prioridade">Média Prioridade</label>
              <input
                type="radio"
                name="prioridade"
                id="prioridade"
                value="media"
              />
            </div>
            <div class="rquiz">
              <label for="prioridade">Alta Prioridade</label>
              <input
                type="radio"
                name="prioridade"
                id="prioridade"
                value="alta"
              />
            </div>

            <label>
              <input type="checkbox" name="copy" value="true" />
              Desejo receber uma cópia da minha resposta por email
            </label>
            <label>
              <input type="checkbox" name="human" value="true" />
              Sou um humano
            </label>

            <div class="row">
              <input type="reset" value="Limpar" class="btn" />
              <input type="submit" value="Enviar" class="btn" />
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>

        article.card*2>img.card__image+(div.card__content>h3.card__title{Título do Card}+p.card__description{Descrição do card com informações relevantes sobre o conteúdo.})
